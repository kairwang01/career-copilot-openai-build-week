name: Product screenshots

# Manual capture of the four marketing product screenshots (SCRUM-33).
# Not a release gate: run it on demand, download the artifact, and commit
# the reviewed PNGs into the marketing assets. The push trigger only fires
# when the capture tooling itself changes (workflow_dispatch needs the file
# on the default branch, which this repo reserves for reviewed merges).
on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/product-screenshots.yml"
      - "scripts/capture-product-screenshots.mjs"

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - run: npm ci
      - run: npm --prefix functions ci
      - run: npm install --global firebase-tools@15.23.0
      - run: npx playwright install --with-deps chromium
      - run: npm --prefix functions run build
      - name: Capture product screenshots against emulators
        env:
          E2E_LLM_STUB: "true"
        run: >-
          firebase emulators:exec --only auth,firestore,functions
          --project demo-careercopilot
          "node scripts/capture-product-screenshots.mjs"
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: product-screenshots-${{ github.sha }}
          path: output/product-screenshots/
          if-no-files-found: error
